  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{

      min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
      padding:32px 24px;text-align:center;
    }

           box-shadow:0 8px 32px rgba(0,0,0,.4);}

      background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.25);
      border-radius:8px;padding:8px 16px;font-size:.75rem;color:#f87171;
      display:inline-flex;align-items:center;gap:7px;margin-bottom:32px;
    }
    button{
      background:#1565C0;color:#fff;border:none;border-radius:12px;
      padding:14px 32px;font-size:.92rem;font-weight:600;cursor:pointer;
      width:100%;max-width:280px;
    }
    button:active{opacity:.85;}
    .version{position:fixed;bottom:16px;font-size:.62rem;color:rgba(255,255,255,.15);}
